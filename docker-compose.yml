# Production-Stack für das gesamte Brewing-Ökosystem.
# Single source of truth — alle Services als Image aus Docker Hub.
# Volume-Mounts: ./supabase/* (kong config + db init scripts).
#
# Bootstrap auf frischem Ubuntu-VPS:
#   curl -fsSL https://raw.githubusercontent.com/alexstuder-web/webPage_infra/main/scripts/bootstrap.sh -o bootstrap.sh && chmod +x bootstrap.sh && ./bootstrap.sh
#
# Lokales Dev: docker-compose.dev.yml (Ports exposed, kein Tunnel/Watchtower).
#
# ==========================================================================
# EINHEITEN-MAPPING — Per-App-DB-Pivot (Phase 1, 2026-05-25)
# ==========================================================================
# Zwei getrennte Lean-Supabase-Stacks (je db+auth+rest+kong), einer pro App.
# realtime/storage/studio/meta entfallen in BEIDEN Stacks (verifiziert ungenutzt).
#
# Einheit              Services                         Netz            Volumes
# ──────────────────────────────────────────────────────────────────────────────
# brew_assistent       web_assistent                    assistent_net   —
#                      db-assistent (DB)                                assistent-db-data
#                      auth-assistent (GoTrue)
#                      rest-assistent (PostgREST)
#                      kong-assistent (API-Gateway)
#                      db-init-assistent (Init, one-shot) —
# rapt_dashboard       web_rapt                         rapt_net        rapt-db-data
#                      db-rapt (DB)
#                      auth-rapt (GoTrue)
#                      rest-rapt (PostgREST)
#                      kong-rapt (API-Gateway)
#                      db-init-rapt (Init, one-shot)    —
# proxy                api_proxy_assistent              assistent_net   —
#                      api_proxy_rapt                   rapt_net        —
#                      (Phase 3 Proxy-Split 2026-05-25: ein Image, zwei Container)
# Hauptseite           web_hauptseite                   brewing_net     —
# Infra                cloudflared (profiles: vps)      assistent_net   —
#                                                       rapt_net
#                      watchtower (profiles: vps)       brewing_net
#
# Dev-Ports (docker-compose.dev.yml):
#   assistent-Stack: kong-assistent 54321:8000, db-assistent 54322:5432
#   rapt-Stack:      kong-rapt      54331:8000, db-rapt      54332:5432
#
# Loopback-Port für Cross-VPS-DB-Tunnel: 15432 (frei von Dev-Ports oben)
#
# TODO (DEFERRED — braucht CF-Credentials):
#   Cloudflare-Tunnel-Routes für:
#     db-assistent.<domain> → http://kong-assistent:8000
#     db-rapt.<domain>      → http://kong-rapt:8000
#   Bis dahin: lokal via host/port (54321/54331) erreichen.
#
# DEPRECATED: supabase.alexstuder.cloud → supabase-kong:8000
#   (ehemaliger Single-Stack-Endpunkt, Phase 0)
#   Entfernen aus cloudflare-routes.json + DNS sobald ALLE drei Bedingungen erfüllt:
#     1. db-assistent.alexstuder.cloud Tunnel-Route live + Flutter angepasst (Phase 5)
#     2. Kein aktiver Client referenziert mehr supabase.alexstuder.cloud
#     3. cloudflare-reconcile.sh erfolgreich auf dem VPS gelaufen (Route aus Tunnel-Ingress entfernt)
# ==========================================================================

name: alexstuder

services:

  # ==========================================================================
  # FRONTENDS  (Nginx mit Flutter-Web-Build bzw. statischem HTML)
  # ==========================================================================

  web_hauptseite:
    container_name: web-hauptseite
    image: ${DOCKERHUB_USERNAME}/web_hauptseite:latest
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - brewing_net

  web_assistent:
    container_name: web-assistent
    image: ${DOCKERHUB_USERNAME}/web_assistent:latest
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - assistent_net

  web_rapt:
    container_name: web-rapt
    image: ${DOCKERHUB_USERNAME}/web_rapt:latest
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - rapt_net

  # ==========================================================================
  # API LAYER — Phase 3: Proxy-Split (2026-05-25)
  # Ein Image (brew_proxy), zwei Container: je an eigenem App-Netz + Stack.
  # PROXY_ROLE differenziert das Verhalten zur Laufzeit.
  #
  # assistent-Proxy: OpenAI + Brewfather; gegen kong-assistent (assistent_net).
  #   KEIN DATABASE_URL — kein db-sync in dieser Rolle.
  #   OPENAI_API_KEY explizit gesetzt; RAPT_SERVICE_ROLE_KEY NICHT im Container.
  # rapt-Proxy:      RAPT-Telemetrie + db-sync; gegen kong-rapt (rapt_net).
  #   DATABASE_URL → RAPT_PROXY_DATABASE_URL (proxy_sync@db-rapt).
  #   RAPT_SERVICE_ROLE_KEY explizit gesetzt; OPENAI_API_KEY NICHT im Container.
  # Env-Scoping: kein env_file — explizite environment:-Maps pro Proxy.
  #   Weder OPENAI_API_KEY noch RAPT_SERVICE_ROLE_KEY landen beim jeweils anderen.
  #
  # Netz-Isolation (Auth-Isolation auf Netz-Ebene, zusätzlich zur JWT-Prüfung):
  #   api_proxy_assistent  ∈ assistent_net  (sieht kong-assistent, web_assistent; NICHT kong-rapt)
  #   api_proxy_rapt       ∈ rapt_net       (sieht kong-rapt, web_rapt; NICHT kong-assistent)
  #
  # Cloudflare-Tunnel (cloudflared hängt an BEIDEN Netzen — sieht beide Proxies):
  #   api-assistent.alexstuder.cloud → api-proxy-assistent:3000  [DEFERRED]
  #   api-rapt.alexstuder.cloud      → api-proxy-rapt:3000        [DEFERRED]
  #   api.alexstuder.cloud           → api-proxy-assistent:3000   [DEPRECATED — bis Flutter umgestellt]
  #
  # Cross-Team-Handoff Phase 3: proxy-coder liefert PROXY_ROLE-fähige server.js.
  # ==========================================================================

  api_proxy_assistent:
    container_name: api-proxy-assistent
    image: ${DOCKERHUB_USERNAME}/brew_proxy:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      kong-assistent:
        condition: service_started
    # NO env_file — env vars are scoped explicitly below.
    # Only vars required by the assistent role land in this container.
    # RAPT_SERVICE_ROLE_KEY, DATABASE_URL, RAPT_SYNC_ENABLED and all
    # rapt-stack secrets are intentionally absent.
    environment:
      # ── Identity ────────────────────────────────────────────────────────────
      PROXY_ROLE: assistent
      # ── Supabase / Kong (assistent stack) ───────────────────────────────────
      SUPABASE_INTERNAL_URL: ${ASSISTENT_PROXY_SUPABASE_URL:-http://kong-assistent:8000}
      SUPABASE_ANON_KEY: ${ASSISTENT_ANON_KEY}
      # ── OpenAI (required for assistent role; proxy aborts at startup if absent) ──
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ── SSO (assistent SIGNS tickets; secret shared with rapt proxy) ─────────
      SSO_SIGNING_SECRET: ${SSO_SIGNING_SECRET}
      # ── CORS ────────────────────────────────────────────────────────────────
      CORS_ORIGIN: ${ASSISTENT_PROXY_CORS_ORIGIN:-}
      # ── Optional tuning vars (all have safe in-code defaults) ────────────────
      PORT: ${PROXY_PORT:-3000}
      BREWFATHER_BASE_URL: ${BREWFATHER_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_FETCH_TIMEOUT_MS: ${OPENAI_FETCH_TIMEOUT_MS:-}
      AUTH_FETCH_TIMEOUT_MS: ${AUTH_FETCH_TIMEOUT_MS:-}
      BF_FETCH_TIMEOUT_MS: ${BF_FETCH_TIMEOUT_MS:-}
      IMAGE_FETCH_TIMEOUT_MS: ${IMAGE_FETCH_TIMEOUT_MS:-}
      SSO_TICKET_TTL_SECS: ${SSO_TICKET_TTL_SECS:-}
      SSO_CLOCK_SKEW_SECS: ${SSO_CLOCK_SKEW_SECS:-}
      # DATABASE_URL intentionally omitted — assistent proxy has no db-sync.
      # RAPT_SERVICE_ROLE_KEY intentionally omitted — assistent proxy never uses it.
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - assistent_net

  api_proxy_rapt:
    container_name: api-proxy-rapt
    image: ${DOCKERHUB_USERNAME}/brew_proxy:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      kong-rapt:
        condition: service_started
    # NO env_file — env vars are scoped explicitly below.
    # Only vars required by the rapt role land in this container.
    # OPENAI_API_KEY is intentionally absent (rapt proxy never calls OpenAI).
    environment:
      # ── Identity ────────────────────────────────────────────────────────────
      PROXY_ROLE: rapt
      # ── Supabase / Kong (rapt stack) ─────────────────────────────────────────
      SUPABASE_INTERNAL_URL: ${RAPT_PROXY_SUPABASE_URL:-http://kong-rapt:8000}
      SUPABASE_ANON_KEY: ${RAPT_ANON_KEY}
      # ── DB-sync (proxy_sync@db-rapt) ─────────────────────────────────────────
      # Vollständiger Conn-String IMMER in .env — kein verschachteltes ${:-}
      # (cicd-Lesson 2026-05-24: :? filewide → Lesson; ${VAR} ohne Default).
      DATABASE_URL: ${RAPT_PROXY_DATABASE_URL}
      RAPT_SYNC_ENABLED: ${RAPT_SYNC_ENABLED:-true}
      # ── SSO (rapt VERIFIES tickets + mints sessions via service_role) ─────────
      SSO_SIGNING_SECRET: ${SSO_SIGNING_SECRET}
      RAPT_SERVICE_ROLE_KEY: ${RAPT_SERVICE_ROLE_KEY}
      # ── CORS ────────────────────────────────────────────────────────────────
      CORS_ORIGIN: ${RAPT_PROXY_CORS_ORIGIN:-}
      # ── Optional tuning vars (all have safe in-code defaults) ────────────────
      PORT: ${PROXY_PORT:-3000}
      RAPT_SYNC_INTERVAL_MS: ${RAPT_SYNC_INTERVAL_MS:-}
      RAPT_FETCH_TIMEOUT_MS: ${RAPT_FETCH_TIMEOUT_MS:-}
      RAPT_CACHE_INTERVAL_MS: ${RAPT_CACHE_INTERVAL_MS:-}
      RAPT_TOKEN_ENDPOINT: ${RAPT_TOKEN_ENDPOINT:-}
      RAPT_API_BASE: ${RAPT_API_BASE:-}
      RAPT_CONTROLLER_ENDPOINT: ${RAPT_CONTROLLER_ENDPOINT:-}
      RAPT_TELEMETRY_ENDPOINT: ${RAPT_TELEMETRY_ENDPOINT:-}
      RAPT_CONTROLLER_USE: ${RAPT_CONTROLLER_USE:-}
      AUTH_FETCH_TIMEOUT_MS: ${AUTH_FETCH_TIMEOUT_MS:-}
      SSO_TICKET_TTL_SECS: ${SSO_TICKET_TTL_SECS:-}
      SSO_CLOCK_SKEW_SECS: ${SSO_CLOCK_SKEW_SECS:-}
      # OPENAI_API_KEY intentionally omitted — rapt proxy never calls OpenAI.
      # BREWFATHER_BASE_URL intentionally omitted — Brewfather routes are assistent-only.
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - rapt_net

  # ==========================================================================
  # LEAN SUPABASE — BREW_ASSISTENT-STACK
  # db + auth + rest + kong; Schema: aibrewgenius + public + graphql_public
  # Netz: assistent_net | Volume: assistent-db-data
  # Versionen gepinnt — KEIN Watchtower-Label (Konvention).
  #
  # Secret-Vars: ASSISTENT_POSTGRES_PASSWORD, ASSISTENT_JWT_SECRET,
  #              ASSISTENT_ANON_KEY, ASSISTENT_SERVICE_ROLE_KEY
  # (Vorgänger-Vars POSTGRES_PASSWORD / JWT_SECRET / ANON_KEY / SERVICE_ROLE_KEY
  #  umbenannt für Eindeutigkeit im Zwei-Stack-Kontext.)
  #
  # Verwaiste Vars (durch Wegfall realtime/storage/studio/meta):
  #   SECRET_KEY_BASE, PG_META_CRYPTO_KEY, DASHBOARD_USERNAME, DASHBOARD_PASSWORD,
  #   DEFAULT_ORGANIZATION_NAME, DEFAULT_PROJECT_NAME
  # → noch in .env vorhanden (bewusst belassen bis User confirm + encrypt-env.sh);
  #   NICHT mehr in compose referenziert — werden beim nächsten encrypt-env.sh-Lauf
  #   durch den User bereinigt.
  # ==========================================================================

  db-assistent:
    container_name: db-assistent
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${ASSISTENT_POSTGRES_PASSWORD}
      PGPORT: 5432
      PGPASSWORD: ${ASSISTENT_POSTGRES_PASSWORD}
      JWT_SECRET: ${ASSISTENT_JWT_SECRET}
      JWT_EXP: 3600
      # ASSISTENT_POSTGRES_PASSWORD: explizit durchreichen damit
      # docker-entrypoint-initdb.d/zz-set-role-passwords.sh es sieht.
      # (Lesson 2026-05-24: Container-Vars müssen im environment:-Block stehen.)
      ASSISTENT_POSTGRES_PASSWORD: ${ASSISTENT_POSTGRES_PASSWORD}
    volumes:
      - assistent-db-data:/var/lib/postgresql/data
      - ./supabase/db_init_assistent/zz-set-role-passwords.sh:/docker-entrypoint-initdb.d/zz-set-role-passwords.sh:ro
      # zz-create-realtime-internal-schema.sql entfällt: kein realtime-Service in diesem Stack.
      # Verifiziert: _realtime-Schema wird weder von GoTrue noch von PostgREST benötigt.
    networks:
      - assistent_net

  auth-assistent:
    container_name: auth-assistent
    image: supabase/gotrue:v2.176.1
    depends_on:
      db-assistent:
        condition: service_healthy
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${ASSISTENT_PUBLIC_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${ASSISTENT_POSTGRES_PASSWORD}@db-assistent:5432/postgres
      GOTRUE_SITE_URL: ${ASSISTENT_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ASSISTENT_ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${ASSISTENT_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    networks:
      - assistent_net

  rest-assistent:
    container_name: rest-assistent
    image: postgrest/postgrest:v12.2.10
    depends_on:
      db-assistent:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${ASSISTENT_POSTGRES_PASSWORD}@db-assistent:5432/postgres
      # storage entfällt (kein Storage-Service) — nur assistent-eigene Schemas.
      PGRST_DB_SCHEMAS: public,graphql_public,aibrewgenius
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${ASSISTENT_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${ASSISTENT_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: postgrest
    networks:
      - assistent_net

  kong-assistent:
    container_name: kong-assistent
    image: kong:2.8.1
    depends_on:
      auth-assistent:
        condition: service_started
      rest-assistent:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./supabase/kong-assistent/kong.yml:/var/lib/kong/kong.yml:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ASSISTENT_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${ASSISTENT_SERVICE_ROLE_KEY}
    networks:
      - assistent_net

  # ==========================================================================
  # DB-INIT — brew_assistent-Stack
  # One-shot Init-Container: Baseline (falls leer) + pending Migrationen.
  # Läuft bei jedem compose up; ist bei unverändertem Schema ein No-op.
  # restart: "no" — beendet sich nach dem Apply (oder bei Fehler, Exit≠0).
  # KEIN Watchtower-Label — Image ist versionsgepinnt (analog Supabase-Konvention).
  #
  # Volume-Mount: ../brew_assistent-new/db_scripts:/sql:ro
  #   Pfad relativ zu webPage_infra/ (Compose-File-Verzeichnis).
  #   Voraussetzung: brew_assistent-new-Repo ist Geschwister von webPage_infra/
  #   (bootstrap.sh klont/aktualisiert es unter $APP_HOME).
  #   Override via ASSISTENT_DB_SCRIPTS_PATH in .env (Default = Geschwister-Pfad).
  # ==========================================================================

  db-init-assistent:
    container_name: db-init-assistent
    # DB_INIT_RUNNER_TAG: gepinnter SHA-Short-Tag aus GHA (z.B. ab12cd3).
    # Setzen in .env nach jedem Build: DB_INIT_RUNNER_TAG=<sha>.
    # Default 'latest' nur als Fallback bis zum ersten gepinnten Deploy.
    image: ${DOCKERHUB_USERNAME}/db_init_runner:${DB_INIT_RUNNER_TAG:-latest}
    pull_policy: always
    restart: "no"
    depends_on:
      db-assistent:
        condition: service_healthy
      auth-assistent:
        condition: service_started
    # Env-Scoping: kein env_file — die environment:-Map unten deckt den vollständigen
    # Runner-Vertrag (DB_HOST/PGPASSWORD/BASELINE_FILE/MIGRATIONS_DIR/STACK_LABEL/
    # REQUIRE_PREMIGRATION_BACKUP). .env existiert in CI nicht → env_file wäre fatal.
    environment:
      DB_HOST: db-assistent
      PGPASSWORD: ${ASSISTENT_POSTGRES_PASSWORD}
      BASELINE_FILE: /sql/full/baseline.sql
      MIGRATIONS_DIR: /sql/migrations
      STACK_LABEL: assistent
      REQUIRE_PREMIGRATION_BACKUP: ${REQUIRE_PREMIGRATION_BACKUP:-0}
    volumes:
      - ${ASSISTENT_DB_SCRIPTS_PATH:-../brew_assistent-new/db_scripts}:/sql:ro
    networks:
      - assistent_net

  # ==========================================================================
  # LEAN SUPABASE — RAPT_DASHBOARD-STACK
  # db + auth + rest + kong; Schema: rapt + public + graphql_public
  # Netz: rapt_net | Volume: rapt-db-data
  # Versionen gepinnt — KEIN Watchtower-Label (Konvention).
  #
  # Secret-Vars: RAPT_POSTGRES_PASSWORD, RAPT_JWT_SECRET,
  #              RAPT_ANON_KEY, RAPT_SERVICE_ROLE_KEY,
  #              RAPT_PROXY_SYNC_PASSWORD (proxy_sync-Rolle, nur in rapt-DB)
  #
  # proxy_sync NUR in rapt-DB (db-sync schreibt nur rapt — Konzept §3).
  # Grants auf rapt-Tabellen: dba-coder Phase 2 (Cross-Team-Handoff).
  # ==========================================================================

  db-rapt:
    container_name: db-rapt
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${RAPT_POSTGRES_PASSWORD}
      PGPORT: 5432
      PGPASSWORD: ${RAPT_POSTGRES_PASSWORD}
      JWT_SECRET: ${RAPT_JWT_SECRET}
      JWT_EXP: 3600
      # Explizit durchreichen damit db_init_rapt/zz-set-role-passwords.sh die Vars sieht.
      # (Lesson 2026-05-24: Container-Vars müssen im environment:-Block stehen.)
      RAPT_POSTGRES_PASSWORD: ${RAPT_POSTGRES_PASSWORD}
      RAPT_PROXY_SYNC_PASSWORD: ${RAPT_PROXY_SYNC_PASSWORD}
    volumes:
      - rapt-db-data:/var/lib/postgresql/data
      - ./supabase/db_init_rapt/zz-set-role-passwords.sh:/docker-entrypoint-initdb.d/zz-set-role-passwords.sh:ro
      # zz-create-realtime-internal-schema.sql entfällt: kein realtime-Service in diesem Stack.
    networks:
      - rapt_net

  auth-rapt:
    container_name: auth-rapt
    image: supabase/gotrue:v2.176.1
    depends_on:
      db-rapt:
        condition: service_healthy
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${RAPT_PUBLIC_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${RAPT_POSTGRES_PASSWORD}@db-rapt:5432/postgres
      GOTRUE_SITE_URL: ${RAPT_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${RAPT_ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${RAPT_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    networks:
      - rapt_net

  rest-rapt:
    container_name: rest-rapt
    image: postgrest/postgrest:v12.2.10
    depends_on:
      db-rapt:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${RAPT_POSTGRES_PASSWORD}@db-rapt:5432/postgres
      # storage entfällt (kein Storage-Service) — nur rapt-eigene Schemas.
      PGRST_DB_SCHEMAS: public,graphql_public,rapt
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${RAPT_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${RAPT_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: postgrest
    networks:
      - rapt_net

  kong-rapt:
    container_name: kong-rapt
    image: kong:2.8.1
    depends_on:
      auth-rapt:
        condition: service_started
      rest-rapt:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./supabase/kong-rapt/kong.yml:/var/lib/kong/kong.yml:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${RAPT_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${RAPT_SERVICE_ROLE_KEY}
    networks:
      - rapt_net

  # ==========================================================================
  # DB-INIT — rapt_dashboard-Stack
  # One-shot Init-Container: Baseline (falls leer) + pending Migrationen.
  # Identisches Runner-Image wie db-init-assistent; Stack-Spezifisches via Env.
  # restart: "no" — beendet sich nach dem Apply (oder bei Fehler, Exit≠0).
  # KEIN Watchtower-Label — Image ist versionsgepinnt.
  #
  # Volume-Mount: ../RAPT_Brewing_Dashboard-new/db_scripts:/sql:ro
  #   rapt-Baseline liegt in db_scripts/baseline.sql (nicht in full/).
  #   Override via RAPT_DB_SCRIPTS_PATH in .env (Default = Geschwister-Pfad).
  # ==========================================================================

  db-init-rapt:
    container_name: db-init-rapt
    # DB_INIT_RUNNER_TAG: identisch zu db-init-assistent — beide Runner-Container
    # referenzieren dasselbe Image mit demselben gepinnten Tag.
    image: ${DOCKERHUB_USERNAME}/db_init_runner:${DB_INIT_RUNNER_TAG:-latest}
    pull_policy: always
    restart: "no"
    depends_on:
      db-rapt:
        condition: service_healthy
      auth-rapt:
        condition: service_started
    # Env-Scoping: kein env_file — die environment:-Map unten deckt den vollständigen
    # Runner-Vertrag. .env existiert in CI nicht → env_file wäre fatal.
    environment:
      DB_HOST: db-rapt
      PGPASSWORD: ${RAPT_POSTGRES_PASSWORD}
      BASELINE_FILE: /sql/baseline.sql
      MIGRATIONS_DIR: /sql/migrations
      STACK_LABEL: rapt
      REQUIRE_PREMIGRATION_BACKUP: ${REQUIRE_PREMIGRATION_BACKUP:-0}
    volumes:
      - ${RAPT_DB_SCRIPTS_PATH:-../RAPT_Brewing_Dashboard-new/db_scripts}:/sql:ro
    networks:
      - rapt_net

  # ==========================================================================
  # INFRASTRUCTURE  (Tunnel + Auto-Update)
  # ==========================================================================

  # ==========================================================================
  # PORTAINER  (Container-Uebersicht, Hub-and-Spoke via Edge-Agent)
  # ==========================================================================
  #
  # ZWEI Services — Bootstrap startet je nach Rolle EINEN davon (nie beide):
  #   portainer            = Hub (Portainer CE Server, zentrales UI)
  #   portainer_edge_agent = Edge-Agent (Spoke-VPS, nur ausgehende Verbindung)
  #
  # Kein Per-App-Profil — selektiver Start via explizitem Service-Namen.
  # KEIN Watchtower-Label — versionsgepinnt analog Supabase-Konvention.
  #
  # Cloudflare-Hostnames (NUR vom Hub-VPS beansprucht):
  #   portainer.alexstuder.cloud → http://portainer:9000   [hinter Cloudflare Access]
  #   edge.alexstuder.cloud      → http://portainer:8000   [oeffentlich, Edge-Key]
  #
  # Edge-Agent-Prinzip: Hub erreichbar via edge.alexstuder.cloud (oeffentlich).
  # Agents pollen NUR ausgehend — kein Inbound-Port, keine ufw-Aenderung.

  portainer:
    container_name: portainer
    # Pinned CE — kein Watchtower-Label (Management-Tool versionsgepinnt halten).
    # Aktuelle stabile CE-Version: 2.27.3 (Stand 2026-05).
    image: portainer/portainer-ce:2.27.3
    profiles: [portainer-hub]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - brewing_net

  portainer_edge_agent:
    container_name: portainer_edge_agent
    # Portainer Agent (Edge-Modus via EDGE=1).
    # Pinned auf dieselbe Minor-Version wie der Hub (2.27.3).
    # profiles: [portainer-agent] — EDGE_KEY Interpolation feuert NUR wenn dieser Profile aktiv ist.
    # Chicken-and-Egg-Sicherung: Hub-VPS hat beim Erst-Bootstrap keinen Key; der Agent-
    # Service muss aus dem Default-Set raus, damit compose ohne Key ladbar bleibt.
    # Lesson 2026-05-24: Container-Vars müssen im environment:-Block stehen.
    # Lesson 2026-05-24: :? in compose environment wäre filewide — ${VAR:-} ist korrekt.
    image: portainer/agent:2.27.3
    profiles: [portainer-agent]
    restart: unless-stopped
    environment:
      EDGE: "1"
      EDGE_KEY: ${PORTAINER_EDGE_KEY:-}
      EDGE_ID: ${PORTAINER_EDGE_ID:-}
      EDGE_INACTIVITY_TIMEOUT: "5m"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - brewing_net

  # ==========================================================================
  # MAILSERVER  (Poste.io — All-in-one SMTP/IMAP/Webmail, versionsgepinnt)
  # ==========================================================================

  posteio:
    container_name: posteio
    image: analogic/poste.io:2.4
    # profiles: [mail] — Mail-Server nicht beim dev-up mitgestartet (kein Port 25/465/… lokal).
    # Starten: docker compose --profile mail up -d posteio
    # (Bootstrap: via TUI-Option "Mailserver (Poste.io)")
    profiles: [mail]
    restart: unless-stopped
    hostname: ${MAIL_HOSTNAME:-mail.alexstuder.cloud}
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
    environment:
      TZ: Europe/Zurich
      HTTPS: "OFF"
    tmpfs:
      - /var/lib/rspamd
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./poste-data:/data
    networks:
      - brewing_net

  # cloudflared + watchtower laufen NUR auf dem VPS, nicht lokal in Dev.
  # cloudflared hängt an BEIDEN App-Netzen, damit es beide Kong-Gateways
  # (kong-assistent:8000, kong-rapt:8000) über den Tunnel erreichbar machen kann.
  # → `profiles: [vps]` heißt: nur aktiv mit `docker compose --profile vps up -d`.

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:2026.5.0
    profiles: [vps]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      # cloudflared muss JEDES Netz erreichen, dessen Container es per Tunnel routet:
      # brewing_net (web-hauptseite, portainer, posteio), assistent_net (web-assistent,
      # kong/api-proxy-assistent), rapt_net (web-rapt, kong/api-proxy-rapt). Ohne brewing_net
      # liefen alexstuder.cloud + portainer. + webmail. ins Leere (cloudflared erreicht den
      # Ziel-Container nicht → 502).
      - brewing_net
      - assistent_net
      - rapt_net

  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    profiles: [vps]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # --label-enable: nur Container mit Watchtower-Label updaten
    # (App-Container; Supabase-Stack bleibt auf gepinnten Versionen).
    command: --interval 300 --cleanup --label-enable
    networks:
      - brewing_net

volumes:
  assistent-db-data:
  rapt-db-data:
  portainer_data:     # Hub-only — leer auf Spoke-VPS (wird nie gemountet wenn nur Agent laeuft)

networks:
  brewing_net:
    driver: bridge
  assistent_net:
    driver: bridge
  rapt_net:
    driver: bridge
