# Produktiv-Stack für das gesamte Brewing-Ökosystem.
# brew_assistent + sein Supabase-Stack werden via `include:` aus dem App-Repo geholt
# (so können sie auch standalone ohne webPage_infra deployed werden).

include:
  - path: ../brew_assistent-new/docker-compose.yml

services:

  web_hauptseite:
    image: ${DOCKERHUB_USERNAME}/web_hauptseite:latest
    restart: unless-stopped
    networks:
      - brewing_net

  web_rapt:
    image: ${DOCKERHUB_USERNAME}/web_rapt:latest
    restart: unless-stopped
    networks:
      - brewing_net

  api_proxy:
    image: ${DOCKERHUB_USERNAME}/brew_proxy:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
    networks:
      - brewing_net
      - assistent_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - brewing_net

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    networks:
      - brewing_net

networks:
  brewing_net:
    driver: bridge
