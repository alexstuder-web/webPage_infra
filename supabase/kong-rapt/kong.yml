# Kong Declarative Config — rapt_dashboard Lean-Supabase-Stack
# Routet /auth/v1/* → auth-rapt:9999, /rest/v1/* → rest-rapt:3000.
# realtime / storage / meta-Routen entfallen (Services nicht deployed — Entscheidung 1).
# CORS aktiv für Browser-Apps.
#
# Sicherheit: JWT-Validierung passiert in den Backend-Services selbst (GoTrue, PostgREST).
# Kong ist hier reiner Router + CORS-Handler.

_format_version: '2.1'
_transform: true

services:

  - name: auth-v1
    url: http://auth-rapt:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest-rapt:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
