# Kong Declarative Config — Supabase API Gateway Routing
# Routet /auth/*, /rest/*, /realtime/*, /storage/* an die jeweiligen Services.
# CORS aktiv für Browser-Apps.
#
# Sicherheit: JWT-Validierung passiert in den Backend-Services selbst (PostgREST,
# GoTrue, Realtime). Kong ist hier nur Router + CORS-Handler.

_format_version: '2.1'
_transform: true

services:

  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  - name: realtime-v1
    url: http://supabase-realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors

  - name: realtime-v1-ws
    url: http://supabase-realtime:4000/socket/websocket
    routes:
      - name: realtime-v1-ws
        strip_path: true
        protocols:
          - http
          - https
        paths:
          - /realtime/v1/websocket
    plugins:
      - name: cors

  - name: storage-v1
    url: http://supabase-storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

  - name: meta
    url: http://supabase-meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: cors
