# Dev-Override für docker-compose.yml — exposed Ports auf localhost,
# damit man direkt im Browser drauf zugreifen kann.
#
# Start:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Stop:   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# cloudflared + watchtower laufen NICHT (haben profile=vps in der base.yml,
# das hier nicht aktiviert wird).

services:

  web_hauptseite:
    ports:
      - "8090:80"   # 8080 lokal oft belegt

  web_assistent:
    ports:
      - "8081:80"

  web_rapt:
    ports:
      - "8082:80"

  api_proxy:
    ports:
      - "8083:3000"

  supabase-kong:
    ports:
      - "54321:8000"

  supabase-db:
    ports:
      - "54322:5432"

  supabase-studio:
    ports:
      - "54323:3000"
