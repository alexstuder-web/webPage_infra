# Dev-Override für docker-compose.yml — exposed Ports auf localhost,
# damit man direkt im Browser drauf zugreifen kann.
#
# Start:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Stop:   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# cloudflared + watchtower laufen NICHT (haben profile=vps in der base.yml,
# das hier nicht aktiviert wird).
#
# pull_policy: missing — überschreibt das base-`pull_policy: always` der App-Services lokal.
# Effekt: lokal gebaute Images werden NICHT durch Hub-Images ersetzt; Docker pullt
# nur, wenn das Image noch gar nicht lokal vorhanden ist (sichert Erststart auf
# frischem Checkout). Supabase-Stack absichtlich NICHT angefasst (versionsgepinnt).
#
# Zwei Lean-Supabase-Stacks — kollisionsfreie Ports:
#   assistent-Stack: kong-assistent 54321:8000 (Kong/API), db-assistent 54322:5432 (Postgres)
#   rapt-Stack:      kong-rapt      54331:8000 (Kong/API), db-rapt      54332:5432 (Postgres)
# Studio-Port 54323 entfällt (kein Studio mehr in beiden Stacks).
#
# Optionales lokales Studio: als separater Dev-only-Service mit profiles: [studio]
# hinzufügbar — NICHT im Prod-Stack (versionsgepinnt, keine App-Abhängigkeit).

services:

  web_hauptseite:
    pull_policy: missing
    ports:
      - "8090:80"   # 8080 lokal oft belegt

  web_assistent:
    pull_policy: missing
    ports:
      - "8081:80"

  web_rapt:
    pull_policy: missing
    ports:
      - "8082:80"

  # Phase 3 Proxy-Split: zwei Proxy-Dev-Overrides (assistent 8083, rapt 8085).
  # Port 8083 = etablierter assistent-Proxy-Port (von Flutter-Smoke-Probe + flutter-coder erwartet).
  # Port 8085 = rapt-Proxy-Port (8081/8082/8083/8090 belegt; 8084 = flutter-Smoke-Port → 8085).
  # env_file/environment-Wiring (PROXY_ROLE, SUPABASE_INTERNAL_URL, DATABASE_URL, CORS_ORIGIN)
  # wird vollständig aus der Base-Compose (docker-compose.yml) geerbt — hier nur Port-Override.
  api_proxy_assistent:
    pull_policy: missing
    ports:
      - "8083:3000"

  api_proxy_rapt:
    pull_policy: missing
    ports:
      - "8085:3000"

  # brew_assistent-Stack (assistent_net): Kong + DB
  kong-assistent:
    ports:
      - "54321:8000"

  db-assistent:
    ports:
      - "54322:5432"

  # rapt_dashboard-Stack (rapt_net): Kong + DB
  kong-rapt:
    ports:
      - "54331:8000"

  db-rapt:
    ports:
      - "54332:5432"

  # db-init-Container: pull_policy: missing — lokal gebaute Runner-Images nicht
  # durch Hub-Images überschreiben (analog App-Services in Dev).
  # Ports: keine — Init-Container exponiert nichts.
  db-init-assistent:
    pull_policy: missing

  db-init-rapt:
    pull_policy: missing

  # posteio: kein Dev-Override nötig — Mail wird lokal nicht gestartet.
  # posteio hat kein 'profiles:' in der base-compose und würde bei einem
  # ungewollten 'docker compose up' (ohne expliziten Service-Namen) mit starten.
  # Schutz: posteio nur via 'docker compose up -d posteio' explizit starten.
  # Dev-Start verhindert außerdem die Port-Belegung (25/465/587/143/993 lokal).
  posteio:
    pull_policy: missing
