name: Build & Push db-init-runner

# Baut das generische db-init-runner-Image und pusht es zu Docker Hub.
# Wird ausgelöst wenn das Runner-Script oder das Dockerfile geändert wird.
#
# Tags:
#   :<git-sha-short>  — gepinnter Tag (7 Zeichen, z.B. ab12cd3)
#   :latest           — Convenience-Alias (immer neuestes Haupt-Image)
# KEIN Watchtower-Label — versionsgepinnt in docker-compose.yml via DB_INIT_RUNNER_TAG.
# Plattform: linux/amd64 (VPS) + linux/arm64 (lokale Dev-Builds).
#
# Org-Secrets (unter alexstuder-web, Scope: webPage_infra):
#   DOCKERHUB_USERNAME  — Docker Hub Username
#   DOCKERHUB_TOKEN     — Docker Hub Personal Access Token

on:
  push:
    branches: [main]
    paths:
      - "scripts/db-init-runner.sh"
      - "db-init/Dockerfile"
      - ".github/workflows/db-init-runner-build.yml"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Compute short SHA
        id: sha
        run: printf 'short=%s\n' "${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # actions/checkout pinned to SHA (v4.2.2, 2024-10-23).
      # Verify: https://github.com/actions/checkout/releases/tag/v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # docker/setup-qemu-action pinned to SHA (v3.6.0, 2025-03-10).
      # Verify: https://github.com/docker/setup-qemu-action/releases/tag/v3.6.0
      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      # docker/setup-buildx-action pinned to SHA (v3.10.0, 2025-03-10).
      # Verify: https://github.com/docker/setup-buildx-action/releases/tag/v3.10.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      # docker/login-action pinned to SHA (v3.4.0, 2025-02-21).
      # Verify: https://github.com/docker/login-action/releases/tag/v3.4.0
      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker/build-push-action pinned to SHA (v6.15.0, 2025-02-21).
      # Verify: https://github.com/docker/build-push-action/releases/tag/v6.15.0
      - name: Build and push db-init-runner
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: db-init/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Zwei Tags: gepinnter SHA-Short-Tag (7 Zeichen, Referenz in compose via DB_INIT_RUNNER_TAG)
          # + :latest als Convenience-Alias.
          # compose referenziert den Pin: ${DB_INIT_RUNNER_TAG:-<sha>} — nie bare :latest.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/db_init_runner:${{ steps.sha.outputs.short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/db_init_runner:latest
